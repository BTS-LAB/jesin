<!DOCTYPE html>
<html>
<head>
  <title>Medical QR Generator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(blue, black);
      color: white;
      margin: 0;
      padding: 20px;
    }

    input, select {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 220px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    #qr {
      margin-top: 20px;
    }

    .card {
      background: linear-gradient(black, red);
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>Medical QR Generator</h1>

<div id="form">
  <input id="name" placeholder="Name">
  <input id="age" placeholder="Age">
  <input id="allergy" placeholder="Allergies">
  <input id="phone" placeholder="Phone">

  <select id="lang">
    <option>English</option>
    <option>Hindi</option>
    <option>Marathi</option>
    <option>Gujarati</option>
    <option>Tamil</option>
    <option>Bengali</option>
  </select>

  <button onclick="generateQR()">MAKE QR CODE</button>
  <div id="qr"></div>
</div>

<div id="card" class="card" style="display:none;"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
function generateQR() {
  let data = {
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    allergy: document.getElementById("allergy").value,
    phone: document.getElementById("phone").value,
    lang: document.getElementById("lang").value
  };

  let url = window.location.href + "#data=" + encodeURIComponent(JSON.stringify(data));

  document.getElementById("qr").innerHTML = "";

  new QRCode(document.getElementById("qr"), {
    text: url,
    width: 200,
    height: 200
  });

  showCard(data);
}

function showCard(data) {
  document.getElementById("card").style.display = "block";
  document.getElementById("card").innerHTML = `
    <h2>🚑 Emergency Medical Card</h2>
    <p><b>Name:</b> ${data.name}</p>
    <p><b>Age:</b> ${data.age}</p>
    <p><b>Allergy:</b> ${data.allergy}</p>
    <p><b>Phone:</b> ${data.phone}</p>
    <p><b>Language:</b> ${data.lang}</p>
    <hr>
    <p>Ambulance: 108 / 112</p>
    <p>Search Google Maps: "nearest hospital near me"</p>
  `;
}
</script>

</body>
</html>
